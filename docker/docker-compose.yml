# Docker Compose 설정
# Docker Compose Configuration
# PostgreSQL 및 MongoDB 로컬 개발 환경
# Local development environment for PostgreSQL and MongoDB

services:
  # PostgreSQL 데이터베이스
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: pgdemo
      POSTGRES_USER: pgdemo
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgdemo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MongoDB 데이터베이스
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    environment:
      MONGO_INITDB_DATABASE: pgdemo
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  builder:
    image: gradle:8.5-jdk21
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - artifacts:/artifacts
      - ${HOME}/.m2:/root/.m2
      - ${HOME}/.gradle:/root/.gradle
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        ./gradlew --no-daemon :pg-main:bootJar :pg-admin:bootJar

        MAIN_JAR="$$(ls -1 pg-main/build/libs/*.jar | grep -vE '(-plain\.jar)$$' | head -n 1)"
        ADMIN_JAR="$$(ls -1 pg-admin/build/libs/*.jar | grep -vE '(-plain\.jar)$$' | head -n 1)"

        cp "$$MAIN_JAR" /artifacts/pg-main.jar
        cp "$$ADMIN_JAR" /artifacts/pg-admin.jar
    restart: "no"

  seeder:
    image: eclipse-temurin:21-jre-jammy
    depends_on:
      builder:
        condition: service_completed_successfully
    volumes:
      - artifacts:/artifacts:ro
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:?SPRING_DATA_MONGODB_URI is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    command:
      - java
      - -jar
      - /artifacts/pg-admin.jar
      - --spring.profiles.active=seeder
      - --spring.main.web-application-type=none
      - --pgdemo.seeder.reset=false
    restart: "no"

  pg-main:
    image: eclipse-temurin:21-jre-jammy
    container_name: pg-main
    depends_on:
      seeder:
        condition: service_completed_successfully
    volumes:
      - artifacts:/artifacts:ro
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:?SPRING_DATA_MONGODB_URI is required}
    command:
      - java
      - -jar
      - /artifacts/pg-main.jar
    restart: unless-stopped

  pg-admin:
    image: eclipse-temurin:21-jre-jammy
    container_name: pg-admin
    depends_on:
      pg-main:
        condition: service_started
    volumes:
      - artifacts:/artifacts:ro
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:?SPRING_DATA_MONGODB_URI is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PG_MAIN_BASE_URL: http://pg-main:8080
    command:
      - java
      - -jar
      - /artifacts/pg-admin.jar
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pg-demo-nginx
    depends_on:
      pg-admin:
        condition: service_started
    ports:
      - "127.0.0.1:81:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/sites-available:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
    restart: unless-stopped

  traffic:
    build:
      context: ..
      dockerfile: docker/Dockerfile.traffic
    depends_on:
      pg-main:
        condition: service_started
    command:
      - --base-url
      - http://pg-main:8080
      - --http-retries
      - "20"
      - --http-retry-sleep-ms
      - "250"
      - --http-retry-max-sleep-ms
      - "2000"
    restart: unless-stopped

# 볼륨 정의
# Volume definitions
volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  artifacts:
    driver: local
