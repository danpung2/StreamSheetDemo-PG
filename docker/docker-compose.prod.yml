# Production-ish compose that runs from prebuilt images (e.g., ECR).
# Requires env vars (no defaults) for app/db connectivity and JWT.

services:
  postgres:
    image: postgres:16-alpine
    container_name: pg-demo-postgres
    environment:
      POSTGRES_DB: pgdemo
      POSTGRES_USER: pgdemo
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgdemo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7.0
    container_name: pg-demo-mongodb
    environment:
      MONGO_INITDB_DATABASE: pgdemo
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  seeder:
    image: ${PG_DEMO_PG_ADMIN_IMAGE:?PG_DEMO_PG_ADMIN_IMAGE is required}
    container_name: pg-demo-seeder
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:?SPRING_DATA_MONGODB_URI is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      # Seeder passwords (for demo accounts)
      SEEDER_PASSWORD_OPERATOR: ${SEEDER_PASSWORD_OPERATOR:?SEEDER_PASSWORD_OPERATOR is required}
      SEEDER_PASSWORD_HQ_ADMIN: ${SEEDER_PASSWORD_HQ_ADMIN:?SEEDER_PASSWORD_HQ_ADMIN is required}
      SEEDER_PASSWORD_HQ_MANAGER: ${SEEDER_PASSWORD_HQ_MANAGER:?SEEDER_PASSWORD_HQ_MANAGER is required}
      SEEDER_PASSWORD_MERCHANT: ${SEEDER_PASSWORD_MERCHANT:?SEEDER_PASSWORD_MERCHANT is required}
    command:
      - java
      - -jar
      - /app/app.jar
      - --spring.profiles.active=seeder
      - --spring.main.web-application-type=none
      - --pgdemo.seeder.reset=false
    restart: "no"

  pg-main:
    image: ${PG_DEMO_PG_MAIN_IMAGE:?PG_DEMO_PG_MAIN_IMAGE is required}
    container_name: pg-demo-pg-main
    depends_on:
      seeder:
        condition: service_completed_successfully
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:?SPRING_DATA_MONGODB_URI is required}
    restart: unless-stopped

  pg-admin:
    image: ${PG_DEMO_PG_ADMIN_IMAGE:?PG_DEMO_PG_ADMIN_IMAGE is required}
    container_name: pg-demo-pg-admin
    depends_on:
      pg-main:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      SPRING_DATA_MONGODB_URI: ${SPRING_DATA_MONGODB_URI:?SPRING_DATA_MONGODB_URI is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PG_MAIN_BASE_URL: http://pg-main:8080
      SECURITY_DEMO_ENABLED: ${SECURITY_DEMO_ENABLED:-true}
      SECURITY_DEMO_USER_EMAIL: ${SECURITY_DEMO_USER_EMAIL:-hq_manager@pgdemo.com}
      SECURITY_DEMO_ACCESS_TOKEN_EXPIRY: ${SECURITY_DEMO_ACCESS_TOKEN_EXPIRY:-15m}
      SECURITY_DEMO_COOKIE_SAME_SITE: ${SECURITY_DEMO_COOKIE_SAME_SITE:-Lax}
      SECURITY_DEMO_COOKIE_SECURE: ${SECURITY_DEMO_COOKIE_SECURE:-true}
    restart: unless-stopped

  nginx:
    image: ${PG_DEMO_NGINX_IMAGE:?PG_DEMO_NGINX_IMAGE is required}
    container_name: pg-demo-nginx
    depends_on:
      pg-admin:
        condition: service_started
    ports:
      - "127.0.0.1:81:80"
    restart: unless-stopped

  traffic:
    image: ${PG_DEMO_TRAFFIC_IMAGE:?PG_DEMO_TRAFFIC_IMAGE is required}
    container_name: pg-demo-traffic
    depends_on:
      pg-main:
        condition: service_started
    command:
      - --base-url
      - http://pg-main:8080
      - --http-retries
      - "20"
      - --http-retry-sleep-ms
      - "250"
      - --http-retry-max-sleep-ms
      - "2000"
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
