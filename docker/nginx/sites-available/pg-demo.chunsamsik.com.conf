server {
  listen 80;
  server_name pg-demo.chunsamsik.com;

  # Public demo session issuance (strict)
  location = /api/demo/start {
    limit_req zone=demo_start burst=2 nodelay;
    proxy_pass http://pg-admin:8081;
    proxy_read_timeout 30s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Export paths can be abused for resource exhaustion
  location ^~ /admin/exports/ {
    limit_req zone=admin_exports burst=2;
    proxy_pass http://pg-admin:8081;
    proxy_read_timeout 600s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://pg-admin:8081;
    proxy_read_timeout 600s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
