# pg-admin 서비스 설정
# pg-admin Service Configuration

spring:
  application:
    name: pg-admin

  # Allow injecting config via Docker secrets (config tree).
  # In containers, you can mount secrets to /run/secrets and use file names as property keys.
  config:
    import: "optional:configtree:/run/secrets/"
  
  # 데이터베이스 설정
  # Database configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  # JPA 설정
  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # MongoDB 설정
  # MongoDB configuration
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
  
  # Thymeleaf 설정
  # Thymeleaf configuration
  thymeleaf:
    cache: false  # 개발 시 캐시 비활성화 / Disable cache in development
    prefix: classpath:/templates/
    suffix: .html

# 서버 설정
# Server configuration
server:
  port: 8081

# pg-main API 설정
# pg-main API configuration
pg-main:
  base-url: http://localhost:8080

# JWT 설정
# JWT configuration
security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 15m
    refresh-token-expiry: 7d
  password:
    min-length: 8
    require-special-char: true
    require-uppercase: true
    require-number: true
  login:
    max-failed-attempts: 5
    lock-duration: 30m
  # Rate Limiting 설정
  # Rate Limiting configuration
  rate-limit:
    enabled: true
    max-attempts: 10        # 시간 윈도우 내 최대 요청 수 / Max requests within time window
    window-duration: 1m     # 시간 윈도우 기간 / Time window duration
    block-duration: 5m      # 제한 초과 시 차단 기간 / Block duration when limit exceeded

# StreamSheet 설정
# StreamSheet configuration
streamsheet:
  row-access-window-size: 100
  flush-batch-size: 1000
  compress-temp-files: true

# 로깅 설정
# Logging configuration
logging:
  level:
    com.example.pgdemo: DEBUG
    org.springframework.security: DEBUG
