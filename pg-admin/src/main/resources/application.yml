# pg-admin 서비스 설정
# pg-admin Service Configuration

spring:
  application:
    name: pg-admin

  # Allow injecting config via Docker secrets (config tree).
  # In containers, you can mount secrets to /run/secrets and use file names as property keys.
  config:
    import: "optional:configtree:/run/secrets/"
  
  # 데이터베이스 설정
  # Database configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pgdemo}
    username: ${SPRING_DATASOURCE_USERNAME:pgdemo}
    password: ${SPRING_DATASOURCE_PASSWORD:pgdemo}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  # JPA 설정
  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # MongoDB 설정
  # MongoDB configuration
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/pgdemo}
  
  # Thymeleaf 설정
  # Thymeleaf configuration
  thymeleaf:
    cache: false  # 개발 시 캐시 비활성화 / Disable cache in development
    prefix: classpath:/templates/
    suffix: .html

# 서버 설정
# Server configuration
server:
  port: 8081

# pg-main API 설정
# pg-main API configuration
pg-main:
  base-url: http://localhost:8080

# JWT 설정
# JWT configuration
security:
  jwt:
    # 256-bit+ key for HMAC-SHA algorithms (Base64 encoded)
    # Default value is for local development only
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjcmV0LWtleS1mb3ItZGV2ZWxvcG1lbnQtb25seS1kby1ub3QtdXNlLWluLXByb2R1Y3Rpb24=}
    access-token-expiry: 15m
    refresh-token-expiry: 7d
  password:
    min-length: 8
    require-special-char: true
    require-uppercase: true
    require-number: true
  login:
    max-failed-attempts: 5
    lock-duration: 30m
  # Rate Limiting 설정
  # Rate Limiting configuration
  rate-limit:
    enabled: true
    # Login/refresh endpoints
    max-attempts: 10        # 시간 윈도우 내 최대 요청 수 / Max requests within time window
    window-duration: 1m     # 시간 윈도우 기간 / Time window duration
    block-duration: 5m      # 제한 초과 시 차단 기간 / Block duration when limit exceeded

    # Demo issuance endpoint (/api/demo/start)
    demo-max-attempts: 5
    demo-window-duration: 1m
    demo-block-duration: 10m

    # Export endpoints (/admin/exports/**)
    export-read-max-attempts: 60
    export-read-window-duration: 1m
    export-read-block-duration: 30s
    export-max-attempts: 10
    export-window-duration: 1m
    export-block-duration: 2m

  demo:
    enabled: true
    user-email: hq_manager@pgdemo.com
    access-token-expiry: 15m
    cookie-same-site: Lax
    # cookie-secure: true  # set true behind HTTPS

# StreamSheet 설정
# StreamSheet configuration
streamsheet:
  row-access-window-size: 100
  flush-batch-size: 1000
  compress-temp-files: true

# 로깅 설정
# Logging configuration
logging:
  level:
    com.example.pgdemo: DEBUG
    org.springframework.security: DEBUG
