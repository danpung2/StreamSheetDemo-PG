<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="layout/main :: layout(~{::section})" th:with="pageTitle='Admin Login'">
  <section class="page login">
    <div class="login-card">
      <div class="login-header">
        <p class="eyebrow">PG Admin Console</p>
        <h1>Sign in</h1>
        <p class="caption">Use your administrator credentials to continue.</p>
      </div>
      <form class="login-form" method="post" action="/api/auth/login">
        <label>
          <span>Email address</span>
          <input type="email" name="email" placeholder="admin@pgdemo.com" required />
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" placeholder="••••••••" required />
        </label>
        <button type="submit" class="button primary">Sign in</button>
      </form>
      <div class="login-footer">
        <span class="caption">Access is logged and monitored.</span>
      </div>
    </div>
  </section>
</html>
