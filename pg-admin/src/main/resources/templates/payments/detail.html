<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="layout/main :: layout(~{::section})" th:with="pageTitle='Payment Detail'">
  <section class="page">
    <div th:replace="fragments/header :: header('Transaction detail')"></div>
    <div class="shell">
      <div th:replace="fragments/sidebar :: sidebar('payments')"></div>
      <main class="main">
        <section class="panel detail">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Transaction</p>
            <h2 th:text="${payment.id}">-</h2>
            </div>
            <span class="status" th:classappend="${payment.statusClass}" th:text="${payment.status}">-</span>
          </div>
          <div class="detail-grid">
            <div class="detail-card">
              <span class="detail-label">Amount</span>
              <strong th:text="${payment.amount}">-</strong>
            </div>
            <div class="detail-card">
              <span class="detail-label">Merchant</span>
              <strong th:text="${payment.merchant}">-</strong>
            </div>
            <div class="detail-card">
              <span class="detail-label">Method</span>
              <strong th:text="${payment.method}">-</strong>
            </div>
            <div class="detail-card">
              <span class="detail-label">Customer</span>
              <strong th:text="${payment.customer}">-</strong>
            </div>
          </div>
          <div class="panel-section">
            <h3>Timeline</h3>
            <div class="table-wrap">
              <table class="event-table">
                <thead>
                  <tr>
                    <th>Time</th>
                    <th>Status</th>
                    <th>Note</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="event : ${payment.events}">
                    <td class="event-time" th:text="${event.time}">-</td>
                    <td class="event-status" th:text="${event.title}">-</td>
                    <td class="event-note" th:text="${event.note}">-</td>
                  </tr>
                  <tr th:if="${payment.events == null or #lists.isEmpty(payment.events)}">
                    <td colspan="3" class="empty">No events.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>
  </section>
</html>
